<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <header class="admin-header">
        <div class="admin-nav-container">
            <div class="admin-logo">
                <a th:href="@{/}">
                    <h1><i class="fas fa-shopping-bag"></i> E-commerce</h1>
                </a>
                <span class="admin-badge">Admin</span>
            </div>
            <div class="admin-user-actions">
                <button class="theme-toggle" id="theme-toggle" title="Alternar tema">
                    <i class="fas fa-sun"></i>
                </button>
                <div class="admin-user-info">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                </div>
                <a th:href="@{/}" class="btn btn-outline btn-small">
                    <i class="fas fa-arrow-left"></i> Voltar ao Site
                </a>
            </div>
        </div>
    </header>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <nav class="admin-nav">
                <ul class="admin-nav-list">
                    <li class="admin-nav-item">
                        <a th:href="@{/dashboard}" class="admin-nav-link">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="admin-nav-item">
                        <a th:href="@{/product}" class="admin-nav-link active">
                            <i class="fas fa-box"></i>
                            <span>Produtos</span>
                        </a>
                    </li>
                    <li class="admin-nav-item">
                        <a th:href="@{/orders}" class="admin-nav-link">
                            <i class="fas fa-shopping-cart"></i>
                            <span>Pedidos</span>
                        </a>
                    </li>
                    <li class="admin-nav-item">
                        <a th:href="@{/users}" class="admin-nav-link">
                            <i class="fas fa-users"></i>
                            <span>Usuários</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="admin-main">

            <section id="produtos-section" class="admin-section active">
                <div class="admin-header-section">
                    <h2><i class="fas fa-box"></i> Gestão de Produtos</h2>
                    <button class="btn btn-primary" id="add-produto-btn"
                        onclick="document.getElementById('produto-form').style.display='grid';">
                        <i class="fas fa-plus"></i> Adicionar Produto
                    </button>
                </div>

                <!-- Products Form -->
                <form id="produto-form" class="form-grid two-columns" th:object="${product}" action="/product/save"
                    method="POST"
                    th:style="${product.id != null} ? 'display:grid; margin-bottom: 2rem;' : 'display:none; margin-bottom: 2rem;'">
                    <input type="text" name="id" th:field="*{id}" style="display:none;">
                    <div class="form-group">
                        <label for="produto-nome">Nome do Produto</label>
                        <input type="text" th:field="*{name}" id="produto-nome" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="produto-categoria">Categoria</label>
                        <select id="produto-categoria" th:field="*{category}" name="category" required>
                            <option value="">Selecione uma categoria</option>
                            <option value="ELECTRONICS">Eletrônicos</option>
                            <option value="CLOTHING">Roupas e Acessórios</option>
                            <option value="HOME_GARDEN">Casa e Jardim</option>
                            <option value="SPORTS">Esportes e Lazer</option>
                            <option value="TOYS">Brinquedos</option>
                            <option value="BEAUTY">Beleza e Saúde</option>
                            <option value="AUTOMOTIVE">Automotivo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="produto-preco">Preço</label>
                        <input type="number" th:field="*{price}" id="produto-preco" name="price" step="0.01" value="0"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="produto-status">Status</label>
                        <select id="produto-status" th:field="*{state}" name="state" required>
                            <option value="ativo">Ativo</option>
                            <option value="inativo">Inativo</option>
                        </select>
                        <label for="produto-quantity">Quantidade</label>
                        <input type="number" id="produto-quantity" name="quantity" th:field="*{stock}" value="1" min="1"
                            required>
                    </div>
                    <div class="form-group full-width">
                        <label for="produto-descricao">Descrição</label>
                        <textarea th:field="*{description}" id="produto-descricao" name="description" rows="4"
                            required></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-outline btn-form"
                            onclick="document.getElementById('produto-form').style.display='none';">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                        <button type="submit" class="btn btn-primary btn-form">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                    </div>
                </form>

                <!-- Filters -->
                <div class="admin-filters">
                    <div class="filter-group">
                        <input type="text" id="search-produtos" placeholder="Buscar produtos..." class="admin-input">
                        <select id="filter-categoria" class="admin-select">
                            <option value="" selected>Todas as categorias</option>
                            <option value="ELECTRONICS">Eletrônicos</option>
                            <option value="CLOTHING">Roupas e Acessórios</option>
                            <option value="HOME_GARDEN">Casa e Jardim</option>
                            <option value="SPORTS">Esportes e Lazer</option>
                            <option value="TOYS">Brinquedos</option>
                            <option value="BEAUTY">Beleza e Saúde</option>
                            <option value="AUTOMOTIVE">Automotivo</option>
                        </select>
                    </div>
                </div>

                <div class="admin-table-container">
                    <table class="admin-table" id="produtos-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Preço</th>
                                <th>Status</th>
                                <th>Quantidade</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="product : ${products}">
                                <td th:text="${product.id}"></td>
                                <td th:text="${product.name}"></td>
                                <td th:text="${product.category}"></td>
                                <td th:text="${product.price}"></td>
                                <td th:text="${product.state}"></td>
                                <td th:text="${product.stock}"></td>
                                <td class="action-buttons">
                                    <a th:href="@{/product/edit/{id}(id=${product.id})}" class="btn-icon btn-edit"
                                        title="Editar">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{/product/delete/{id}(id=${product.id})}" class="btn-icon btn-delete"
                                        title="Excluir"
                                        onclick="return confirm('Tem certeza que deseja excluir este produto?');">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/admin.js}"></script>
</body>

</html>
